; PlatformIO Project Configuration File

[platformio]
default_envs = slave1

[env]
platform = espressif32@^6.9.0
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200

; ---------- SLAVE 1 (ID=1) ----------
[env:slave1]
build_flags = -D ROLE_SLAVE -D MODBUS_SLAVE_ID=1
build_src_filter = +<main.cpp> -<master.cpp>
lib_deps =
	mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@^3.0.10
	adafruit/Adafruit GFX Library@^1.11.9
	https://github.com/emelianov/modbus-esp8266.git

; ---------- SLAVE 2 (ID=2) ----------
[env:slave2]
build_flags = -D ROLE_SLAVE -D MODBUS_SLAVE_ID=2
build_src_filter = +<main.cpp> -<master.cpp>
lib_deps =
	mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@^3.0.10
	adafruit/Adafruit GFX Library@^1.11.9
	https://github.com/emelianov/modbus-esp8266.git

; ---------- MASTER (WiFi + WebServer + LoRa + Modbus) ----------
[env:master]
build_flags = -D ROLE_MASTER
build_src_filter = +<master.cpp> -<main.cpp>
board_build.filesystem = littlefs
; partition mac dinh "default" co 1.5MB app + 1.5MB SPIFFS, du cho data folder
board_build.partitions = default.csv
lib_deps =
	https://github.com/emelianov/modbus-esp8266.git
	bblanchon/ArduinoJson@^7.0.4

; Giu env mac dinh cu de OTA cu khong vo? (tuy chon)
[env:esp32doit-devkit-v1]
extends = env:slave1
